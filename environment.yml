name: diaggen-plus
channels:
  - pytorch
  - conda-forge
  - defaults

dependencies:
  - python=3.10
  - pip

  # ── Deep Learning ─────────────────────────────────────────────────────────
  - pytorch>=2.1
  - torchvision
  - torchaudio
  - cpuonly                        # remove this line and add cudatoolkit if GPU available

  # ── Data & ML ─────────────────────────────────────────────────────────────
  - numpy>=1.24
  - pandas>=2.0
  - scikit-learn>=1.3
  - scipy

  # ── NLP ───────────────────────────────────────────────────────────────────
  - spacy>=3.7
  - gensim>=4.3                    # FastText / Word2Vec / GloVe loading

  # ── Visualisation ─────────────────────────────────────────────────────────
  - matplotlib>=3.7
  - seaborn>=0.12
  - plotly>=5.15

  # ── Notebooks ─────────────────────────────────────────────────────────────
  - jupyter
  - ipykernel
  - ipywidgets

  # ── App ───────────────────────────────────────────────────────────────────
  - streamlit>=1.30

  # ── Dev tooling ───────────────────────────────────────────────────────────
  - pytest
  - black
  - flake8
  - python-dotenv
  - pyyaml
  - tqdm

  # ── pip-only packages ──────────────────────────────────────────────────────
  - pip:
      # Hugging Face ecosystem
      - transformers>=4.40
      - datasets>=2.18
      - evaluate>=0.4
      - accelerate>=0.28
      - setfit>=1.0               # few-shot learning (Phase 2)
      - huggingface-hub>=0.22

      # LLM provider clients (all installed; active one set in config)
      - anthropic>=0.25           # Claude API
      - openai>=1.20              # OpenAI GPT API
      - ollama>=0.1               # Local models via Ollama

      # NLP extras
      - nltk>=3.8

      # Synthetic data / augmentation
      - imbalanced-learn>=0.12    # SMOTE fallback (Phase 2 risk mitigation)

      # Evaluation & logging
      - mlflow>=2.11              # experiment tracking
      - rich>=13.0                # pretty terminal output
